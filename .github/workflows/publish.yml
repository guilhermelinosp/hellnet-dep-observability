name: Publish NuGet
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HELLNET_SERVICE_NAME: test-service
      HELLNET_OTLP_ENDPOINT: http://localhost:4317
      HELLNET_OTLP_PROTOCOL: grpc
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore app/Hellnet.Observability.slnx
      - name: Build
        run: dotnet build app/Hellnet.Observability.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test app/Hellnet.Observability.slnx --configuration Release --no-build --verbosity normal
      - name: Pack
        run: dotnet pack app/Hellnet.Observability.slnx --configuration Release --no-build --output ./artifacts
      - name: Publish to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
