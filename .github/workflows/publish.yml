name: Publish NuGet
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore app/*.slnx
      - name: Build
        run: dotnet build app/*.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test app/*.slnx --configuration Release --no-build
      - name: Pack
        run: dotnet pack app/*.slnx --configuration Release --no-build --output ./artifacts
      - name: Publish
        run: dotnet nuget push "./artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json
