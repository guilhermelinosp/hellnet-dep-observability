name: Auto Release
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get current version from manifest
        id: version
        run: |
          CURRENT=$(jq -r '.["Hellnet.Observability"]' .release-please-manifest.json)
          echo "CURRENT=$CURRENT"

          # Parse version: 1.0.0-beta.15 -> major=1, minor=0, patch=0, beta=15
          if [[ $CURRENT =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-beta\.([0-9]+)$ ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            BETA=${BASH_REMATCH[4]}
          else
            MAJOR=1; MINOR=0; PATCH=0; BETA=0
          fi

          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --pretty=format:"%s")
          else
            COMMITS=$(git log --oneline --pretty=format:"%s")
          fi

          echo "COMMITS=$COMMITS"

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qi "^feat"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qi "^fix\|^perf\|^refactor"; then
            BUMP="patch"
          fi

          echo "BUMP=$BUMP"

          # Calculate next version (keep beta format)
          case $BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BETA=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              BETA=0
              ;;
            patch)
              BETA=$((BETA + 1))
              ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}-beta.${BETA}"
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "BUMP_TYPE=$BUMP" >> $GITHUB_OUTPUT
      - name: Update manifest
        run: |
          jq --arg v "${{ steps.version.outputs.NEXT_VERSION }}" '.["Hellnet.Observability"] = $v' .release-please-manifest.json > .release-please-manifest.json.tmp
          mv .release-please-manifest.json.tmp .release-please-manifest.json
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release-please-manifest.json
          git commit -m "chore: release ${{ steps.version.outputs.NEXT_VERSION }}"
          git push origin main
      - name: Push tag to trigger release
        run: |
          git tag "v${{ steps.version.outputs.NEXT_VERSION }}"
          git push origin "v${{ steps.version.outputs.NEXT_VERSION }}"
