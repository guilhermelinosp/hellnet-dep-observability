name: Publish NuGet
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HELLNET_SERVICE_NAME: test-service
      HELLNET_OTLP_ENDPOINT: http://localhost:4317
      HELLNET_OTLP_PROTOCOL: grpc
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Restore
        run: dotnet restore app/*.slnx
      - name: Build
        run: dotnet build app/*.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}
      - name: Test
        run: dotnet test app/*.slnx --configuration Release --no-build --verbosity normal
      - name: Pack
        run: dotnet pack app/*.slnx --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.VERSION }}
      - name: Publish to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Changes
            See [CHANGELOG](https://github.com/guilhermelinosp/hellnet-dep-observability/commits/${{ github.ref_name }})

            ## Installation
            ```bash
            dotnet add package Hellnet.Observability --version ${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'rc') }}
          make_latest: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
