name: Auto Release
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Get current version from csproj
        id: current_version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' app/src/Hellnet.Observability/Hellnet.Observability.csproj || echo "0.0.0")
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Determine next version
        id: next_version
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"%s")
          else
            COMMITS=$(git log --oneline --pretty=format:"%s" $LAST_TAG..HEAD)
          fi

          # Check for breaking changes
          if echo "$COMMITS" | grep -qi "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qi "^feat"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qi "^fix\|^perf\|^refactor"; then
            BUMP="patch"
          else
            BUMP="patch"
          fi

          # Parse current version
          CURRENT="${{ steps.current_version.outputs.CURRENT_VERSION }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "BUMP_TYPE=$BUMP" >> $GITHUB_OUTPUT
      - name: Update version in csproj
        run: |
          sed -i "s/<Version>[^<]*<\/Version>/<Version>${{ steps.next_version.outputs.NEXT_VERSION }}<\/Version>/" app/src/Hellnet.Observability/Hellnet.Observability.csproj
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/Hellnet.Observability/Hellnet.Observability.csproj
          git commit -m "chore: release ${{ steps.next_version.outputs.NEXT_VERSION }}"
      - name: Create signed tag
        run: |
          git tag -s "v${{ steps.next_version.outputs.NEXT_VERSION }}" -m "Release v${{ steps.next_version.outputs.NEXT_VERSION }}"
      - name: Push changes and tag
        run: |
          git push origin main
          git push origin "v${{ steps.next_version.outputs.NEXT_VERSION }}"
